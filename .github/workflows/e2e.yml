name: E2E (Playwright)

on:
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Runner-local serve. Vercel GitHub auto-deploy has been unreliable
      # since 2026-04-24 (docs/gap-analysis-2026-05-19.md finding C2-b);
      # this job no longer waits on *.vercel.app. Build + start + wait-on +
      # run tests against localhost.

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (production)
        run: pnpm build

      - name: Start server
        run: |
          nohup pnpm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server ready
        run: pnpm exec wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: pnpm test:e2e

      - name: Stop server
        if: always()
        run: |
          if [[ -f server.pid ]]; then
            kill "$(cat server.pid)" || true
          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ github.run_id }}
          path: server.log
          retention-days: 7
