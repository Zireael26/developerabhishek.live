name: E2E (Playwright)

on:
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Bash-based Vercel preview wait — see ADR-0005 follow-ups + the
      # analogous block in .github/workflows/lighthouse.yml. The
      # wait-for-vercel-preview action stalls on StatusContext-type
      # deployments (which is what this repo has).
      - name: Wait for Vercel preview
        id: preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            payload="$(gh api "repos/$REPO/commits/$PR_SHA/status" --jq '.statuses[] | select(.context == "Vercel") | {state, target_url}' | head -1)"
            state="$(echo "$payload" | jq -r '.state // empty')"
            url="$(echo "$payload" | jq -r '.target_url // empty')"
            if [[ "$state" == "success" && -n "$url" ]]; then
              echo "url=$url" >> "$GITHUB_OUTPUT"
              echo "Vercel preview ready: $url"
              exit 0
            fi
            echo "Waiting for Vercel preview (state=$state)…"
            sleep 15
          done
          echo "Timed out waiting for Vercel preview." >&2
          exit 1

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
