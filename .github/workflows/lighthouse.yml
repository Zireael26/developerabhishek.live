name: Lighthouse + Axe

on:
  pull_request:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          standalone: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Runner-local serve. Vercel GitHub auto-deploy has been unreliable
      # since 2026-04-24 (docs/gap-analysis-2026-05-19.md finding C2-b);
      # this job no longer waits on *.vercel.app. Build + start + wait-on +
      # audit against localhost.

      - name: Build (production)
        run: pnpm build

      - name: Start server
        run: |
          nohup pnpm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server ready
        run: pnpm exec wait-on http://localhost:3000 --timeout 60000

      - name: Lighthouse (desktop)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/work/neev
            http://localhost:3000/writing
          configPath: ./lighthouserc.yml
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results-desktop

      - name: Lighthouse (mobile)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/work/neev
            http://localhost:3000/writing
          configPath: ./lighthouserc.mobile.yml
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results-mobile

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4

      # Axe-core gate gets armed (`continue-on-error` removed) in PR-4 of
      # the gap-analysis plan, after home.spec.ts un-fixmes the WCAG block.
      - name: Axe-core scan (reporting only)
        continue-on-error: true
        run: |
          axe http://localhost:3000/ http://localhost:3000/work/neev http://localhost:3000/writing \
            --exit \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa

      - name: Stop server
        if: always()
        run: |
          if [[ -f server.pid ]]; then
            kill "$(cat server.pid)" || true
          fi

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ github.run_id }}
          path: server.log
          retention-days: 7
