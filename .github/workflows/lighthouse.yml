name: Lighthouse + Axe

on:
  pull_request:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Poll the GitHub Statuses API for Vercel's "Vercel" context until it
      # reports success, then pull the preview URL out of target_url. More
      # reliable than wait-for-vercel-preview@v1.3.2, which hangs when
      # Vercel reports as a StatusContext rather than a CheckRun.
      - name: Wait for Vercel preview
        id: preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            payload="$(gh api "repos/$REPO/commits/$PR_SHA/status" --jq '.statuses[] | select(.context == "Vercel") | {state, target_url}' | head -1)"
            state="$(echo "$payload" | jq -r '.state // empty')"
            url="$(echo "$payload" | jq -r '.target_url // empty')"
            if [[ "$state" == "success" && -n "$url" ]]; then
              echo "url=$url" >> "$GITHUB_OUTPUT"
              echo "Vercel preview ready: $url"
              exit 0
            fi
            echo "Waiting for Vercel preview (state=$state)…"
            sleep 15
          done
          echo "Timed out waiting for Vercel preview." >&2
          exit 1

      - name: Lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ steps.preview.outputs.url }}
            ${{ steps.preview.outputs.url }}/work/neev
            ${{ steps.preview.outputs.url }}/writing
          configPath: ./lighthouserc.yml
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4

      - name: Axe-core scan
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          axe "$PREVIEW_URL" "$PREVIEW_URL/work/neev" "$PREVIEW_URL/writing" \
            --exit \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa
