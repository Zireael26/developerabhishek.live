name: Lighthouse + Axe

on:
  pull_request:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # The Vercel "Vercel" status context's target_url points at the
      # deployment dashboard, not the served preview. Parse the Vercel bot's
      # PR comment instead — it ships the real *.vercel.app URL. Poll both:
      # wait for Vercel status = success, then grep the first vercel.app URL
      # out of any sticky comment the Vercel bot posted on the PR.
      - name: Wait for Vercel preview
        id: preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 600))
          while (( SECONDS < deadline )); do
            state="$(gh api "repos/$REPO/commits/$PR_SHA/status" --jq '[.statuses[] | select(.context == "Vercel")] | .[0].state // empty')"
            if [[ "$state" == "success" ]]; then
              # Filter by Vercel bot author so a PR comment containing a
              # stray vercel.app URL can't shadow the real deployment.
              url="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --jq '[.[] | select(.user.login == "vercel[bot]")] | .[].body' | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)"
              if [[ -n "$url" ]]; then
                echo "url=$url" >> "$GITHUB_OUTPUT"
                echo "Vercel preview ready: $url"
                exit 0
              fi
              echo "Vercel status success but no *.vercel.app URL in PR comments yet"
            else
              echo "Waiting for Vercel preview (state=${state:-missing})…"
            fi
            sleep 15
          done
          echo "Timed out waiting for Vercel preview." >&2
          exit 1

      - name: Lighthouse (desktop)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ steps.preview.outputs.url }}
            ${{ steps.preview.outputs.url }}/work/neev
            ${{ steps.preview.outputs.url }}/writing
          configPath: ./lighthouserc.yml
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Lighthouse (mobile)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ steps.preview.outputs.url }}
            ${{ steps.preview.outputs.url }}/work/neev
            ${{ steps.preview.outputs.url }}/writing
          configPath: ./lighthouserc.mobile.yml
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4

      # Phase 3 ships the scan; Phase 5 (launch) fixes the remaining
      # violations (color-contrast accounts for the bulk today) and drops
      # continue-on-error so the gate bites. Report still surfaces in the
      # step log so regressions are visible.
      - name: Axe-core scan (reporting only until Phase 5)
        continue-on-error: true
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          axe "$PREVIEW_URL" "$PREVIEW_URL/work/neev" "$PREVIEW_URL/writing" \
            --exit \
            --tags wcag2a,wcag2aa,wcag21a,wcag21aa
