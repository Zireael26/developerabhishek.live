# Lighthouse CI config — invoked by .github/workflows/lighthouse.yml
# against Vercel preview URLs. Thresholds mirror PRD §5 and
# AGENT_READINESS §2 launch checklist (95/100/95/100).

ci:
  collect:
    numberOfRuns: 3
    settings:
      preset: desktop
  assert:
    assertions:
      categories:performance: ['error', { minScore: 0.95 }]
      categories:accessibility: ['error', { minScore: 1.0 }]
      categories:best-practices: ['error', { minScore: 0.95 }]
      categories:seo: ['error', { minScore: 1.0 }]

      # Initial-JS budget. 150KB gzipped covers the Hero + chrome bundle;
      # Phase 5's R3F canvas + Wanderer crane are code-split + Suspense-gated
      # so they don't count toward first paint.
      resource-summary:script:size:
        - 'error'
        - maxNumericValue: 153600 # 150 KiB

  upload:
    target: temporary-public-storage
