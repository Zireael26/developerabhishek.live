# Lighthouse CI config — invoked by .github/workflows/lighthouse.yml
# against Vercel preview URLs.
#
# Launch target (PRD §5 + AGENT_READINESS §2): Perf ≥ 0.95 / A11y 1.0 /
# BP ≥ 0.95 / SEO 1.0. During Phase 3 the CI gate runs at the current
# observed floor with `warn` severity so regressions surface without
# blocking merges. Phase 5 (launch) tightens these back to `error` once
# the real a11y + SEO fixes land (meta description + rel canonical +
# sitemap + robots + remaining WCAG items).

ci:
  collect:
    numberOfRuns: 3
    settings:
      preset: desktop
  assert:
    assertions:
      categories:performance: ['warn', { minScore: 0.9 }]
      categories:accessibility: ['warn', { minScore: 0.95 }]
      categories:best-practices: ['warn', { minScore: 0.9 }]
      categories:seo: ['warn', { minScore: 0.9 }]

      # Initial-JS budget. 200 KiB ceiling during Phase 5 — R3F 9 +
      # drei 10 + three.js push the code-split chunks the preloader
      # fetches alongside the main bundle, even though they are
      # dynamically imported via ssr:false + Suspense. Post-launch
      # (Phase 6) the target pulls back to 160 KiB once bundle-analyzer
      # surfaces exactly which dependency is hitting initial JS.
      resource-summary:script:size:
        - 'warn'
        - maxNumericValue: 204800 # 200 KiB

  upload:
    target: temporary-public-storage
