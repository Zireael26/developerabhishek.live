# Lighthouse CI config — invoked by .github/workflows/lighthouse.yml.
# Runner-local serve (post-PR-2 of gap-analysis plan); audited URLs are
# http://localhost:3000/... rather than *.vercel.app.
#
# Launch target (PRD §5 + AGENT_READINESS §2): Perf ≥ 0.95 / A11y 1.0 /
# BP ≥ 0.95 / SEO 1.0. PR-3 of the gap-analysis plan promotes the
# assertions that current measurements clear to `error` severity, leaving
# the rest at `warn`. The bundle-budget assertion stays at `warn` because
# the post-Phase-5 measurement (377 KiB) exceeds the 200 KiB target; a
# follow-up perf PR brings it back down toward 150 KiB. See
# docs/BUNDLE_BUDGET.md + docs/bundle-snapshots/2026-05-19-bundle.md.

ci:
  collect:
    numberOfRuns: 3
    settings:
      preset: desktop
  assert:
    assertions:
      # Measured 2026-05-19 desktop home: 1.00 / 0.97 / 0.96 / 0.92.
      # Promote performance + best-practices + accessibility to error at
      # thresholds the current numbers clear. SEO stays at warn 0.9
      # because the PRD's 1.0 aspiration is still short by 0.08 — fixing
      # that is a content + meta work item, not a CI gate.
      categories:performance: ['error', { minScore: 0.95 }]
      categories:accessibility: ['error', { minScore: 0.95 }]
      categories:best-practices: ['error', { minScore: 0.95 }]
      categories:seo: ['warn', { minScore: 0.9 }]

      # Initial-JS budget. Aspirational 150 KiB; current measurement
      # 386 KiB (377 KiB). 400 KiB warn ceiling suppresses per-PR noise
      # without erasing the obligation — the follow-up perf/budget-overrun
      # ROADMAP item tracks the reduction back toward 150 KiB. Promote to
      # error only after the next measurement clears 200 KiB.
      resource-summary:script:size:
        - 'warn'
        - maxNumericValue: 409600 # 400 KiB

  upload:
    target: temporary-public-storage
