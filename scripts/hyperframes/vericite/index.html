<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>vericite · card reel</title>
<style>
  :root {
    --bg: #f5f1e8;
    --bg-2: #eee8d9;
    --ink: #1a1a1e;
    --ink-70: rgba(26, 26, 30, 0.72);
    --ink-60: rgba(26, 26, 30, 0.55);
    --ink-10: rgba(26, 26, 30, 0.08);
    --hairline: rgba(26, 26, 30, 0.18);
    --accent: #13423d;
    --accent-60: color-mix(in oklab, var(--accent) 60%, transparent);
    --motion-node: oklch(0.78 0.11 150);
    --mono: 'JetBrains Mono', monospace;
  }
  *,
  *::before,
  *::after { box-sizing: border-box; }
  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  #root {
    position: relative;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background:
      linear-gradient(90deg, rgba(19, 66, 61, 0.07) 0 1px, rgba(19, 66, 61, 0) 1px 86px),
      linear-gradient(0deg, rgba(26, 26, 30, 0.05) 0 1px, rgba(26, 26, 30, 0) 1px 64px),
      var(--bg);
  }

  svg.stage { display: block; width: 100%; height: 100%; }
  .clip { position: absolute; inset: 0; will-change: transform, opacity; }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 650;
    fill: var(--ink);
    letter-spacing: 0.02em;
  }
  .micro {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: var(--ink-70);
    letter-spacing: 0.02em;
  }
  .query,
  .node,
  .citation {
    fill: var(--bg-2);
    stroke: var(--hairline);
    stroke-width: 1;
  }
  .node.is-active,
  .citation.is-active {
    fill: rgba(19, 66, 61, 0.14);
    stroke: var(--accent);
  }
  .chunk {
    fill: var(--bg);
    stroke: var(--hairline);
    stroke-width: 1;
  }
  .edge-flow {
    fill: none;
    stroke: rgba(19, 66, 61, 0.45);
    stroke-width: 1.4;
    stroke-linecap: round;
  }
  .packet { fill: var(--motion-node); }
  .score {
    fill: var(--accent);
    transform-box: fill-box;
    transform-origin: left center;
  }
  .check {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="600" data-height="400" data-start="0" data-duration="5" data-track-index="0">
    <div id="vericite-card-scene" class="clip" data-start="0" data-duration="5" data-track-index="1">
      <svg class="stage" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <path class="edge-flow" id="rag-a" d="M160 98 C200 100 220 106 252 120" />
        <path class="edge-flow" id="rag-b" d="M346 128 C382 138 404 160 430 192" />
        <path class="edge-flow" id="rag-c" d="M430 230 C392 268 348 286 286 294" />
        <path class="edge-flow" id="rag-d" d="M286 294 C230 286 196 260 160 224" />

        <g id="query">
          <rect class="query" x="42" y="66" width="118" height="64" rx="7" />
          <text class="label" x="62" y="93">QUERY</text>
          <text class="micro" x="62" y="113">policy claim?</text>
        </g>

        <g id="embed">
          <rect class="node" x="252" y="86" width="94" height="74" rx="7" />
          <text class="label" x="276" y="116">EMBED</text>
          <circle class="packet" cx="278" cy="138" r="3" />
          <circle class="packet" cx="300" cy="138" r="3" />
          <circle class="packet" cx="322" cy="138" r="3" />
        </g>

        <g id="chunks">
          <rect class="node" x="430" y="172" width="124" height="92" rx="7" />
          <text class="label" x="452" y="200">CHUNKS</text>
          <rect class="chunk" x="452" y="214" width="78" height="12" rx="2" />
          <rect class="chunk" x="452" y="234" width="58" height="12" rx="2" />
        </g>

        <g id="rerank">
          <rect class="node" x="208" y="258" width="120" height="82" rx="7" />
          <text class="label" x="232" y="286">RERANK</text>
          <rect class="chunk" x="232" y="302" width="70" height="10" rx="2" />
          <rect class="score" id="rank-score" x="232" y="302" width="58" height="10" rx="2" />
          <text class="micro" x="232" y="324">score .91</text>
        </g>

        <g id="cite">
          <rect class="citation" x="46" y="188" width="116" height="72" rx="7" />
          <text class="label" x="70" y="216">CITE</text>
          <text class="micro" x="70" y="236">[2] source</text>
          <path class="check" id="cite-check" d="M124 232 L132 240 L148 222" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" />
        </g>

        <circle class="packet" id="packet-a" cx="160" cy="98" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-b" cx="346" cy="128" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-c" cx="430" cy="230" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-d" cx="286" cy="294" r="5" data-layout-allow-overflow />
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/MotionPathPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(MotionPathPlugin);

    const tl = gsap.timeline({ paused: true });
    tl.from('#query', { x: -24, opacity: 0, duration: 0.45, ease: 'power3.out' }, 0.15);
    tl.from('#embed', { y: -22, opacity: 0, duration: 0.42, ease: 'back.out(1.3)' }, 0.42);
    tl.from('#chunks', { x: 26, opacity: 0, duration: 0.5, ease: 'expo.out' }, 0.74);
    tl.from('#rerank', { y: 24, opacity: 0, duration: 0.46, ease: 'power2.out' }, 1.04);
    tl.from('#cite', { x: -18, scale: 0.96, opacity: 0, duration: 0.46, ease: 'power4.out' }, 1.28);

    tl.fromTo('#packet-a', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#rag-a', align: '#rag-a', alignOrigin: [0.5, 0.5] },
      duration: 0.85,
      ease: 'power1.inOut',
    }, 1.32);
    tl.to('#embed .node', { fill: 'rgba(19, 66, 61, 0.14)', stroke: '#13423D', duration: 0.2 }, 2.05);
    tl.fromTo('#packet-b', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#rag-b', align: '#rag-b', alignOrigin: [0.5, 0.5] },
      duration: 0.82,
      ease: 'power2.inOut',
    }, 2.05);
    tl.fromTo('#packet-c', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#rag-c', align: '#rag-c', alignOrigin: [0.5, 0.5] },
      duration: 0.9,
      ease: 'power3.inOut',
    }, 2.75);
    tl.from('#rank-score', { scaleX: 0, duration: 0.45, ease: 'power2.out' }, 3.35);
    tl.fromTo('#packet-d', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#rag-d', align: '#rag-d', alignOrigin: [0.5, 0.5] },
      duration: 0.8,
      ease: 'power1.inOut',
    }, 3.55);
    tl.to('#cite .citation', { fill: 'rgba(19, 66, 61, 0.14)', stroke: '#13423D', duration: 0.24 }, 4.08);
    tl.to('#cite-check', { strokeDashoffset: 0, duration: 0.4, ease: 'power2.out' }, 4.18);
    tl.to(['#packet-a', '#packet-b', '#packet-c', '#packet-d'], { opacity: 0, duration: 0.22 }, 4.65);

    window.__timelines = window.__timelines || {};
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
