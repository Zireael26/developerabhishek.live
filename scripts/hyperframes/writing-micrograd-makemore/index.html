<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>writing · micrograd makemore</title>
    <link rel="stylesheet" href="shared/tokens.css" />
    <link rel="stylesheet" href="shared/base.css" />
    <style>
      #root {
        background:
          linear-gradient(90deg, rgba(19, 66, 61, 0.08) 0 1px, transparent 1px 120px),
          linear-gradient(0deg, rgba(26, 26, 30, 0.055) 0 1px, transparent 1px 84px), var(--bg);
      }
      .scene {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(0, 690px) 320px;
        grid-template-rows: 128px minmax(0, 1fr);
        gap: 18px 36px;
        padding: 54px 66px 52px;
      }
      .title {
        grid-column: 1;
        grid-row: 1;
        align-self: start;
        margin: 0;
        font-family: 'Newsreader', serif;
        font-size: 52px;
        font-weight: 400;
        line-height: 1.02;
        letter-spacing: 0;
        max-width: 15ch;
      }
      .kicker {
        grid-column: 2;
        grid-row: 1;
        align-self: end;
        justify-self: end;
        margin: 0;
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: right;
        color: var(--ink-70);
      }
      .graph {
        grid-column: 1;
        grid-row: 2;
        align-self: center;
        width: 690px;
        height: 390px;
      }
      .edge {
        stroke-dasharray: 180;
        stroke-dashoffset: 0;
      }
      .node {
        fill: var(--bg);
        stroke: var(--accent);
        stroke-width: 1.5;
      }
      .node-hot {
        fill: var(--accent);
      }
      .node-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        fill: var(--ink);
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .node-hot + .node-label {
        fill: var(--accent-ink);
      }
      .grad {
        fill: var(--motion-node);
        opacity: 0;
      }
      .model {
        grid-column: 2;
        grid-row: 2;
        align-self: center;
        border-left: 1px solid var(--hairline);
        padding-left: 28px;
      }
      .model-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-70);
        margin-bottom: 18px;
      }
      .token-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin-bottom: 24px;
      }
      .token {
        display: grid;
        place-items: center;
        height: 56px;
        border: 1px solid var(--hairline);
        background: var(--bg-2);
        font-family: 'Newsreader', serif;
        font-size: 31px;
      }
      .bars {
        display: grid;
        gap: 11px;
      }
      .bar {
        height: 15px;
        background: var(--ink-10);
        position: relative;
        overflow: hidden;
      }
      .bar > span {
        position: absolute;
        inset: 0 auto 0 0;
        width: var(--w);
        background: var(--accent);
        transform-origin: left;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="root"
      data-start="0"
      data-duration="8"
      data-track-index="0"
      data-width="1200"
      data-height="676"
    >
      <div id="micrograd-scene" class="clip" data-start="0" data-duration="8" data-track-index="1">
        <div class="scene">
          <h1 class="title">Scalar graph to character model</h1>
          <p class="kicker">micrograd -> makemore</p>
          <svg class="graph" viewBox="0 0 760 410" aria-hidden="true">
            <path id="path-x" class="edge" d="M72 294 C 148 250, 156 190, 230 174" />
            <path id="path-w" class="edge" d="M72 92 C 140 120, 158 154, 230 174" />
            <path id="path-b" class="edge" d="M96 358 C 180 320, 198 240, 284 236" />
            <path id="path-plus" class="edge" d="M284 236 C 360 230, 376 196, 452 194" />
            <path id="path-tanh" class="edge" d="M506 194 C 584 194, 610 172, 686 150" />
            <path id="path-loss" class="edge is-dashed" d="M506 194 C 586 250, 600 306, 688 326" />

            <circle class="node" cx="72" cy="294" r="36" />
            <text class="node-label" x="72" y="294">x</text>
            <circle class="node" cx="72" cy="92" r="36" />
            <text class="node-label" x="72" y="92">w</text>
            <circle class="node" cx="96" cy="358" r="30" />
            <text class="node-label" x="96" y="358">b</text>
            <circle class="node node-hot" cx="256" cy="190" r="50" />
            <text class="node-label" x="256" y="190">+</text>
            <circle class="node" cx="452" cy="194" r="52" />
            <text class="node-label" x="452" y="194">tanh</text>
            <circle class="node" cx="686" cy="150" r="42" />
            <text class="node-label" x="686" y="150">logit</text>
            <circle class="node" cx="688" cy="326" r="42" />
            <text class="node-label" x="688" y="326">loss</text>

            <circle id="grad-a" class="grad" cx="72" cy="294" r="7" />
            <circle id="grad-b" class="grad" cx="72" cy="92" r="7" />
            <circle id="grad-c" class="grad" cx="96" cy="358" r="7" />
            <circle id="grad-d" class="grad" cx="256" cy="190" r="7" />
          </svg>
          <aside class="model" aria-hidden="true">
            <div class="model-label">next character distribution</div>
            <div class="token-row">
              <span class="token">m</span>
              <span class="token">a</span>
              <span class="token">k</span>
              <span class="token">e</span>
              <span class="token">_</span>
            </div>
            <div class="bars">
              <div class="bar"><span style="--w: 74%"></span></div>
              <div class="bar"><span style="--w: 46%"></span></div>
              <div class="bar"><span style="--w: 62%"></span></div>
              <div class="bar"><span style="--w: 31%"></span></div>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/MotionPathPlugin.min.js"></script>
    <script>
      gsap.registerPlugin(MotionPathPlugin);

      const tl = gsap.timeline({ paused: true });
      tl.from('.title', { y: 28, opacity: 0, duration: 0.55, ease: 'power3.out' }, 0);
      tl.from('.kicker', { y: 18, opacity: 0, duration: 0.45, ease: 'power2.out' }, 0.15);
      tl.from('.model', { x: 28, opacity: 0, duration: 0.55, ease: 'power2.out' }, 0.35);
      tl.fromTo(
        '.edge',
        { strokeDashoffset: 180 },
        { strokeDashoffset: 0, duration: 1.2, stagger: 0.08, ease: 'power1.out' },
        0.25,
      );
      tl.from(
        '.node',
        {
          scale: 0.72,
          opacity: 0,
          transformOrigin: 'center',
          duration: 0.45,
          stagger: 0.06,
          ease: 'back.out(1.4)',
        },
        0.45,
      );
      tl.from(
        '.token',
        { y: 18, opacity: 0, duration: 0.4, stagger: 0.08, ease: 'power2.out' },
        1.05,
      );
      tl.from('.bar span', { scaleX: 0, duration: 0.7, stagger: 0.08, ease: 'power2.out' }, 1.25);

      tl.to('#grad-a', { opacity: 1, duration: 0.08 }, 1.55);
      tl.to(
        '#grad-a',
        {
          motionPath: { path: '#path-x', align: '#path-x', alignOrigin: [0.5, 0.5] },
          duration: 2.2,
          ease: 'none',
          repeat: 1,
        },
        1.55,
      );
      tl.to('#grad-b', { opacity: 1, duration: 0.08 }, 1.85);
      tl.to(
        '#grad-b',
        {
          motionPath: { path: '#path-w', align: '#path-w', alignOrigin: [0.5, 0.5] },
          duration: 2.0,
          ease: 'none',
          repeat: 1,
        },
        1.85,
      );
      tl.to('#grad-c', { opacity: 1, duration: 0.08 }, 2.2);
      tl.to(
        '#grad-c',
        {
          motionPath: { path: '#path-b', align: '#path-b', alignOrigin: [0.5, 0.5] },
          duration: 1.8,
          ease: 'none',
          repeat: 1,
        },
        2.2,
      );
      tl.to('#grad-d', { opacity: 1, duration: 0.08 }, 3.0);
      tl.to(
        '#grad-d',
        {
          motionPath: { path: '#path-plus', align: '#path-plus', alignOrigin: [0.5, 0.5] },
          duration: 2.0,
          ease: 'none',
          repeat: 1,
        },
        3.0,
      );
      tl.to(
        '.node-hot',
        {
          scale: 1.08,
          transformOrigin: 'center',
          duration: 0.6,
          yoyo: true,
          repeat: 3,
          ease: 'sine.inOut',
        },
        2.6,
      );
      tl.to(
        '.token',
        {
          backgroundColor: 'rgba(19, 66, 61, 0.16)',
          duration: 0.35,
          stagger: 0.12,
          yoyo: true,
          repeat: 1,
        },
        5.15,
      );
      tl.to(['#grad-a', '#grad-b', '#grad-c', '#grad-d'], { opacity: 0, duration: 0.35 }, 7.35);

      window.__timelines = window.__timelines || {};
      window.__timelines['root'] = tl;
    </script>
  </body>
</html>
