<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>writing · ai for msme</title>
    <link rel="stylesheet" href="shared/tokens.css" />
    <link rel="stylesheet" href="shared/base.css" />
    <style>
      #root {
        background:
          linear-gradient(90deg, rgba(19, 66, 61, 0.08) 0 1px, rgba(19, 66, 61, 0) 1px 124px),
          linear-gradient(0deg, rgba(26, 26, 30, 0.045) 0 1px, rgba(26, 26, 30, 0) 1px 78px), var(--bg);
      }
      .scene {
        position: absolute;
        inset: 0;
        padding: 56px 66px 54px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 38px;
      }
      .head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
        gap: 42px;
      }
      h1 {
        margin: 0;
        font-family: 'Newsreader', serif;
        font-size: 58px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0;
        max-width: 16ch;
      }
      .metric {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        color: var(--ink-70);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        text-align: right;
      }
      .metric strong {
        display: block;
        margin-top: 7px;
        font-family: 'Newsreader', serif;
        font-size: 38px;
        font-weight: 400;
        color: var(--accent);
        letter-spacing: 0;
        text-transform: none;
      }
      .board {
        border-top: 1px solid var(--hairline);
        border-bottom: 1px solid var(--hairline);
        padding: 36px 0 34px;
      }
      svg {
        width: 100%;
        height: 100%;
      }
      .source,
      .assist,
      .human {
        fill: var(--bg-2);
        stroke: var(--hairline);
        stroke-width: 1;
      }
      .assist.is-hot,
      .human.is-hot {
        fill: rgba(19, 66, 61, 0.12);
        stroke: var(--accent);
      }
      .label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 17px;
        fill: var(--ink);
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .sub {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        fill: var(--ink-60);
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .path {
        fill: none;
        stroke: var(--accent-60);
        stroke-width: 1.5;
        stroke-linecap: round;
      }
      .path.is-dashed {
        stroke: var(--ink-40);
        stroke-dasharray: 5 6;
      }
      .packet {
        opacity: 0;
      }
      .conflict {
        fill: none;
        stroke: var(--accent);
        stroke-width: 2;
      }
      .check {
        fill: none;
        stroke: var(--accent);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="root"
      data-start="0"
      data-duration="8"
      data-track-index="0"
      data-width="1200"
      data-height="676"
    >
      <div id="msme-scene" class="clip" data-start="0" data-duration="8" data-track-index="1">
        <div class="scene">
          <div class="head">
            <h1>AI has to fit the MSME workflow</h1>
            <div class="metric">adoption constraint<strong>no new mental model</strong></div>
          </div>
          <div class="board">
            <svg viewBox="0 0 1068 408" aria-hidden="true">
              <path id="flow-wa" class="path" d="M164 78 C230 96 280 130 346 164" />
              <path id="flow-ledger" class="path" d="M164 166 C230 166 280 166 346 172" />
              <path id="flow-tally" class="path" d="M164 254 C230 236 280 204 346 180" />
              <path id="flow-sheet" class="path" d="M164 342 C230 302 286 234 346 188" />
              <path id="flow-record" class="path" d="M522 176 H690" />
              <path id="flow-human" class="path is-dashed" d="M690 220 C742 266 796 292 862 306" />

              <rect class="source" x="40" y="42" width="124" height="72" rx="8" />
              <text class="label" x="102" y="72">WHATSAPP</text>
              <text class="sub" x="102" y="96">orders</text>

              <rect class="source" x="40" y="130" width="124" height="72" rx="8" />
              <text class="label" x="102" y="160">LEDGER</text>
              <text class="sub" x="102" y="184">stock</text>

              <rect class="source" x="40" y="218" width="124" height="72" rx="8" />
              <text class="label" x="102" y="248">TALLY</text>
              <text class="sub" x="102" y="272">accounts</text>

              <rect class="source" x="40" y="306" width="124" height="72" rx="8" />
              <text class="label" x="102" y="336">SHEETS</text>
              <text class="sub" x="102" y="360">delivery</text>

              <rect class="assist is-hot" x="346" y="116" width="176" height="120" rx="10" />
              <text class="label" x="434" y="152">CAPTURE</text>
              <text class="label" x="434" y="178">RECONCILE</text>
              <text class="label" x="434" y="204">SUMMARIZE</text>
              <path id="capture-check" class="check" d="M398 226 L414 242 L452 206" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" />

              <rect class="assist" x="690" y="128" width="144" height="96" rx="10" />
              <text class="label" x="762" y="166">RECORD</text>
              <text class="sub" x="762" y="194">what happened</text>

              <rect class="human is-hot" x="862" y="262" width="166" height="92" rx="10" />
              <text class="label" x="945" y="296">OPERATOR</text>
              <text class="label" x="945" y="320">DECIDES</text>
              <text class="sub" x="945" y="344">disputed invoice</text>
              <circle id="conflict-ring" class="conflict" cx="862" cy="306" r="24" opacity="0" />

              <circle id="packet-a" class="packet" cx="164" cy="78" r="8" />
              <circle id="packet-b" class="packet" cx="164" cy="166" r="8" />
              <circle id="packet-c" class="packet" cx="164" cy="254" r="8" />
              <circle id="packet-d" class="packet" cx="164" cy="342" r="8" />
              <circle id="packet-e" class="packet" cx="522" cy="176" r="8" />
              <circle id="packet-f" class="packet" cx="690" cy="220" r="8" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/MotionPathPlugin.min.js"></script>
    <script>
      gsap.registerPlugin(MotionPathPlugin);

      const tl = gsap.timeline({ paused: true });
      tl.from('h1', { y: 28, opacity: 0, duration: 0.55, ease: 'power3.out' }, 0.18);
      tl.from('.metric', { x: 24, opacity: 0, duration: 0.45, ease: 'power2.out' }, 0.32);
      tl.from('.source', { x: -28, opacity: 0, duration: 0.38, stagger: 0.1, ease: 'power4.out' }, 0.55);
      tl.from('.assist.is-hot', { scale: 0.94, opacity: 0, duration: 0.5, ease: 'back.out(1.35)' }, 0.98);
      tl.from('.assist:not(.is-hot)', { x: 24, opacity: 0, duration: 0.45, ease: 'expo.out' }, 1.28);
      tl.from('.human', { y: 24, opacity: 0, duration: 0.48, ease: 'power2.out' }, 1.52);

      tl.fromTo('#packet-a', { opacity: 0 }, { opacity: 1, motionPath: { path: '#flow-wa', align: '#flow-wa', alignOrigin: [0.5, 0.5] }, duration: 0.9, ease: 'power1.inOut' }, 1.7);
      tl.fromTo('#packet-b', { opacity: 0 }, { opacity: 1, motionPath: { path: '#flow-ledger', align: '#flow-ledger', alignOrigin: [0.5, 0.5] }, duration: 0.9, ease: 'power2.inOut' }, 1.92);
      tl.fromTo('#packet-c', { opacity: 0 }, { opacity: 1, motionPath: { path: '#flow-tally', align: '#flow-tally', alignOrigin: [0.5, 0.5] }, duration: 0.9, ease: 'power3.inOut' }, 2.14);
      tl.fromTo('#packet-d', { opacity: 0 }, { opacity: 1, motionPath: { path: '#flow-sheet', align: '#flow-sheet', alignOrigin: [0.5, 0.5] }, duration: 0.9, ease: 'power1.inOut' }, 2.36);
      tl.to('#capture-check', { strokeDashoffset: 0, duration: 0.48, ease: 'power2.out' }, 3.28);
      tl.fromTo('#packet-e', { opacity: 0 }, { opacity: 1, motionPath: { path: '#flow-record', align: '#flow-record', alignOrigin: [0.5, 0.5] }, duration: 1.0, ease: 'power2.inOut' }, 3.55);
      tl.to('.assist:not(.is-hot)', { fill: 'rgba(19, 66, 61, 0.12)', stroke: '#13423D', duration: 0.32 }, 4.35);
      tl.fromTo('#packet-f', { opacity: 0 }, { opacity: 1, motionPath: { path: '#flow-human', align: '#flow-human', alignOrigin: [0.5, 0.5] }, duration: 1.15, ease: 'power3.inOut' }, 4.7);
      tl.fromTo('#conflict-ring', { opacity: 0.55, scale: 0.8, transformOrigin: 'center' }, { opacity: 0, scale: 1.9, duration: 0.9, ease: 'sine.out', repeat: 1 }, 5.72);
      tl.to(['#packet-a', '#packet-b', '#packet-c', '#packet-d', '#packet-e', '#packet-f'], { opacity: 0, duration: 0.35 }, 7.35);

      window.__timelines = window.__timelines || {};
      window.__timelines['root'] = tl;
    </script>
  </body>
</html>
