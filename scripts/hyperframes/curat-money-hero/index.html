<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>curat-money · hero loop</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<link rel="stylesheet" href="../shared/base.css" />
<style>
  /* 1600×900 ambient hero. Seven offer rows; selector glides top-down and
     settles on the best (row 4). Slow, deliberate — this is a page bed. */

  svg.stage { display: block; width: 100%; height: 100%; opacity: 0.55; }

  .header-bar  { fill: var(--accent); opacity: 0.08; }
  .header-tick { stroke: var(--ink-25); stroke-width: 1; }

  .cmp-row { fill: var(--ink-05); stroke: var(--ink-15); stroke-width: 1; }
  .cmp-bar { fill: var(--accent-40); }

  .selector { fill: none; stroke: var(--accent); stroke-width: 2; rx: 6; }
</style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="1600" data-height="900" data-start="0" data-duration="10">
    <div class="clip" data-start="0" data-duration="10" data-track-index="0">
      <svg class="stage" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <rect class="header-bar" x="200" y="200" width="1200" height="50" rx="4" />
        <line class="header-tick" x1="620"  y1="200" x2="620"  y2="250" />
        <line class="header-tick" x1="920"  y1="200" x2="920"  y2="250" />
        <line class="header-tick" x1="1220" y1="200" x2="1220" y2="250" />

        <g id="row-1"><rect class="cmp-row" x="200" y="272" width="1200" height="40" rx="4" /><rect class="cmp-bar" x="640" y="282" width="180" height="20" rx="3" /></g>
        <g id="row-2"><rect class="cmp-row" x="200" y="328" width="1200" height="40" rx="4" /><rect class="cmp-bar" x="640" y="338" width="130" height="20" rx="3" /></g>
        <g id="row-3"><rect class="cmp-row" x="200" y="384" width="1200" height="40" rx="4" /><rect class="cmp-bar" x="640" y="394" width="220" height="20" rx="3" /></g>
        <g id="row-4"><rect class="cmp-row" x="200" y="440" width="1200" height="40" rx="4" /><rect class="cmp-bar" x="640" y="450" width="260" height="20" rx="3" /></g>
        <g id="row-5"><rect class="cmp-row" x="200" y="496" width="1200" height="40" rx="4" /><rect class="cmp-bar" x="640" y="506" width="160" height="20" rx="3" /></g>
        <g id="row-6"><rect class="cmp-row" x="200" y="552" width="1200" height="40" rx="4" /><rect class="cmp-bar" x="640" y="562" width="110" height="20" rx="3" /></g>
        <g id="row-7"><rect class="cmp-row" x="200" y="608" width="1200" height="40" rx="4" /><rect class="cmp-bar" x="640" y="618" width="90"  height="20" rx="3" /></g>

        <rect class="selector" id="selector"
              x="192" y="268" width="1216" height="48" rx="6" opacity="0" />
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    // Act 1 (0–2.5s) — rows fade in, top to bottom
    ['#row-1','#row-2','#row-3','#row-4','#row-5','#row-6','#row-7'].forEach((sel, i) => {
      tl.from(sel, { y: 10, opacity: 0, duration: 0.4, ease: 'power2.out' }, 0.1 + i * 0.3);
    });

    // Act 2 (3–7s) — selector appears on row 1 and glides to row 4 (best)
    tl.to('#selector', { opacity: 1, duration: 0.4, ease: 'power2.out' }, 3.0);
    tl.fromTo('#selector',
      { attr: { y: 268 } },
      { attr: { y: 436 }, duration: 3.6, ease: 'power2.inOut' },
      3.4
    );

    // Act 3 (7–8s) — best-row bar expands to signal selection
    tl.to('#row-4 .cmp-bar', {
      attr: { width: 320 }, duration: 1.0, ease: 'power2.out', yoyo: true, repeat: 1,
    }, 7.0);

    // Reset (9–10s)
    tl.to('#selector', { opacity: 0, duration: 0.7, ease: 'power1.in' }, 9.0);

    window.__timelines = window.__timelines || {};
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
