<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>bluehost-agents · card reel</title>
<style>
  :root {
    --bg: #f5f1e8;
    --bg-2: #eee8d9;
    --ink: #1a1a1e;
    --ink-70: rgba(26, 26, 30, 0.72);
    --ink-10: rgba(26, 26, 30, 0.08);
    --hairline: rgba(26, 26, 30, 0.18);
    --accent: #13423d;
    --accent-60: color-mix(in oklab, var(--accent) 60%, transparent);
    --motion-node: oklch(0.78 0.11 150);
    --mono: 'JetBrains Mono', monospace;
  }
  *,
  *::before,
  *::after { box-sizing: border-box; }
  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  #root {
    position: relative;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background:
      linear-gradient(90deg, rgba(19, 66, 61, 0.07) 0 1px, rgba(19, 66, 61, 0) 1px 72px),
      linear-gradient(0deg, rgba(26, 26, 30, 0.055) 0 1px, rgba(26, 26, 30, 0) 1px 56px),
      var(--bg);
  }

  svg.stage { display: block; width: 100%; height: 100%; }
  .clip { position: absolute; inset: 0; will-change: transform, opacity; }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 650;
    fill: var(--ink);
    letter-spacing: 0.02em;
  }
  .micro {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: var(--ink-70);
    letter-spacing: 0.02em;
  }
  .runtime,
  .tool,
  .trace {
    fill: var(--bg-2);
    stroke: var(--hairline);
    stroke-width: 1;
  }
  .runtime.is-active,
  .tool.is-active,
  .trace.is-active {
    fill: rgba(19, 66, 61, 0.14);
    stroke: var(--accent);
  }
  .edge-flow {
    fill: none;
    stroke: rgba(19, 66, 61, 0.45);
    stroke-width: 1.4;
    stroke-linecap: round;
  }
  .packet { fill: var(--motion-node); }
  .span {
    fill: var(--accent);
    transform-box: fill-box;
    transform-origin: left center;
  }
  .span-bg { fill: var(--ink-10); }
  .ring {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.2;
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="600" data-height="400" data-start="0" data-duration="5" data-track-index="0">
    <div id="bluehost-agents-card-scene" class="clip" data-start="0" data-duration="5" data-track-index="1">
      <svg class="stage" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <path class="edge-flow" id="tool-dns" d="M260 138 C218 104 188 86 142 82" />
        <path class="edge-flow" id="tool-kb" d="M306 178 C250 196 220 212 174 246" />
        <path class="edge-flow" id="tool-bill" d="M376 148 C426 116 456 102 508 100" />
        <path class="edge-flow" id="observe" d="M376 216 C414 252 442 278 482 310" />

        <g id="runtime">
          <rect class="runtime" x="240" y="114" width="142" height="126" rx="9" />
          <circle class="ring" id="runtime-ring" cx="311" cy="174" r="42" />
          <text class="label" x="270" y="146">AGENT</text>
          <text class="micro" x="270" y="166">runtime</text>
          <text class="micro" x="270" y="194">policy gate</text>
          <text class="micro" x="270" y="214">state commit</text>
        </g>

        <g id="dns">
          <rect class="tool" x="54" y="54" width="106" height="58" rx="7" />
          <text class="label" x="78" y="83">DNS</text>
          <text class="micro" x="78" y="101">lookup</text>
        </g>
        <g id="kb">
          <rect class="tool" x="70" y="216" width="112" height="62" rx="7" />
          <text class="label" x="96" y="246">KB</text>
          <text class="micro" x="96" y="264">article</text>
        </g>
        <g id="billing">
          <rect class="tool" x="444" y="70" width="112" height="62" rx="7" />
          <text class="label" x="468" y="100">BILLING</text>
          <text class="micro" x="468" y="118">account</text>
        </g>

        <g id="trace">
          <rect class="trace" x="430" y="266" width="120" height="82" rx="7" />
          <text class="label" x="454" y="294">TRACE</text>
          <rect class="span-bg" x="454" y="310" width="72" height="8" rx="2" />
          <rect class="span" id="span-a" x="454" y="310" width="58" height="8" rx="2" />
          <rect class="span-bg" x="454" y="328" width="72" height="8" rx="2" />
          <rect class="span" id="span-b" x="454" y="328" width="36" height="8" rx="2" />
        </g>

        <circle class="packet" id="packet-a" cx="260" cy="138" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-b" cx="306" cy="178" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-c" cx="376" cy="148" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-d" cx="376" cy="216" r="5" data-layout-allow-overflow />
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/MotionPathPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(MotionPathPlugin);

    const tl = gsap.timeline({ paused: true });
    tl.from('#runtime', { scale: 0.94, opacity: 0, duration: 0.5, ease: 'back.out(1.35)' }, 0.15);
    tl.from('#dns', { x: -22, opacity: 0, duration: 0.38, ease: 'power3.out' }, 0.48);
    tl.from('#billing', { x: 22, opacity: 0, duration: 0.44, ease: 'expo.out' }, 0.66);
    tl.from('#kb', { y: 22, opacity: 0, duration: 0.42, ease: 'power2.out' }, 0.84);
    tl.from('#trace', { x: 18, y: 18, opacity: 0, duration: 0.46, ease: 'power4.out' }, 1.08);

    tl.fromTo('#runtime-ring', { scale: 1, opacity: 0.5 }, { scale: 1.75, opacity: 0, duration: 1.0, ease: 'sine.out' }, 1.05);
    tl.fromTo('#packet-a', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#tool-dns', align: '#tool-dns', alignOrigin: [0.5, 0.5] },
      duration: 0.75,
      ease: 'power1.inOut',
    }, 1.4);
    tl.to('#dns .tool', { fill: 'rgba(19, 66, 61, 0.14)', stroke: '#13423D', duration: 0.22 }, 2.05);
    tl.fromTo('#packet-b', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#tool-kb', align: '#tool-kb', alignOrigin: [0.5, 0.5] },
      duration: 0.82,
      ease: 'power2.inOut',
    }, 2.05);
    tl.fromTo('#packet-c', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#tool-bill', align: '#tool-bill', alignOrigin: [0.5, 0.5] },
      duration: 0.82,
      ease: 'power3.inOut',
    }, 2.55);
    tl.to('#billing .tool', { fill: 'rgba(19, 66, 61, 0.14)', stroke: '#13423D', duration: 0.22 }, 3.22);
    tl.fromTo('#packet-d', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#observe', align: '#observe', alignOrigin: [0.5, 0.5] },
      duration: 0.9,
      ease: 'power1.inOut',
    }, 3.35);
    tl.from('#span-a', { scaleX: 0, duration: 0.35, ease: 'power2.out' }, 4.02);
    tl.from('#span-b', { scaleX: 0, duration: 0.35, ease: 'power3.out' }, 4.18);
    tl.to(['#packet-a', '#packet-b', '#packet-c', '#packet-d'], { opacity: 0, duration: 0.22 }, 4.66);

    window.__timelines = window.__timelines || {};
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
