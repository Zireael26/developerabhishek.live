<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>bluehost-agents · card reel</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<link rel="stylesheet" href="../shared/base.css" />
<style>
  /* 600×400 — agent latency curve climbing beneath a dashed budget line. Three
     waypoint dots ping in sequence, then the curve re-draws on loop. */

  svg.stage { display: block; width: 100%; height: 100%; }

  .axis { stroke: var(--ink-15); stroke-width: 1; }

  .curve {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .budget {
    fill: none;
    stroke: var(--ink-40);
    stroke-width: 1;
    stroke-dasharray: 4 5;
  }

  .waypoint {
    fill: var(--accent);
  }
  .waypoint-ring {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.2;
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="600" data-height="400" data-start="0" data-duration="5">
    <div class="clip" data-start="0" data-duration="5" data-track-index="0">
      <svg class="stage" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <!-- faint axis rules -->
        <line class="axis" x1="80" y1="320" x2="520" y2="320" />
        <line class="axis" x1="80" y1="80"  x2="80"  y2="320" />

        <!-- budget line — dashed, static -->
        <line class="budget" x1="80" y1="160" x2="520" y2="160" />

        <!-- latency curve — drawn in; two smooth cubics so it reads as org data -->
        <path class="curve" id="curve"
              d="M 80 300 C 180 280, 240 220, 300 200
                 S 420 220, 520 170"
              pathLength="1"
              stroke-dasharray="1" stroke-dashoffset="1" />

        <!-- waypoint dots + rings at curve milestones -->
        <g id="wp-1">
          <circle class="waypoint-ring" cx="180" cy="262" r="10" />
          <circle class="waypoint" cx="180" cy="262" r="4" />
        </g>
        <g id="wp-2">
          <circle class="waypoint-ring" cx="300" cy="200" r="10" />
          <circle class="waypoint" cx="300" cy="200" r="4" />
        </g>
        <g id="wp-3">
          <circle class="waypoint-ring" cx="460" cy="190" r="10" />
          <circle class="waypoint" cx="460" cy="190" r="4" />
        </g>
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    // Hide waypoints at start so they appear in step with the curve draw
    tl.set(['#wp-1', '#wp-2', '#wp-3'], { opacity: 0 }, 0);

    // Act 1 (0–2s) — curve draws in, left to right
    tl.to('#curve', { strokeDashoffset: 0, duration: 2.0, ease: 'power1.inOut' }, 0);

    // Act 2 (roughly in sync with curve progress) — waypoints fade in as the
    // "pen" passes over them
    tl.to('#wp-1', { opacity: 1, duration: 0.2 }, 0.75);
    tl.to('#wp-2', { opacity: 1, duration: 0.2 }, 1.30);
    tl.to('#wp-3', { opacity: 1, duration: 0.2 }, 1.80);

    // Act 3 (2–4s) — waypoint rings ping outward, staggered
    tl.fromTo('#wp-1 .waypoint-ring',
      { scale: 1, opacity: 0.55 },
      { scale: 2.0, opacity: 0, duration: 1.0, ease: 'power1.out' },
      2.0
    );
    tl.fromTo('#wp-2 .waypoint-ring',
      { scale: 1, opacity: 0.55 },
      { scale: 2.0, opacity: 0, duration: 1.0, ease: 'power1.out' },
      2.35
    );
    tl.fromTo('#wp-3 .waypoint-ring',
      { scale: 1, opacity: 0.55 },
      { scale: 2.0, opacity: 0, duration: 1.0, ease: 'power1.out' },
      2.70
    );

    // Reset (4.4–5s) — curve fades so the next loop starts from blank
    tl.to('#curve', { strokeDashoffset: 1, duration: 0.6, ease: 'power2.in' }, 4.4);
    tl.to(['#wp-1', '#wp-2', '#wp-3'], { opacity: 0, duration: 0.4 }, 4.5);

    window.__timelines = window.__timelines || {};
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
