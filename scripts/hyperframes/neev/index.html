<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>neev · card reel</title>
<style>
  :root {
    --bg: #f5f1e8;
    --bg-2: #eee8d9;
    --ink: #1a1a1e;
    --ink-70: rgba(26, 26, 30, 0.72);
    --ink-40: rgba(26, 26, 30, 0.38);
    --ink-10: rgba(26, 26, 30, 0.08);
    --hairline: rgba(26, 26, 30, 0.18);
    --accent: #13423d;
    --accent-60: color-mix(in oklab, var(--accent) 60%, transparent);
    --accent-05: color-mix(in oklab, var(--accent) 5%, transparent);
    --motion-node: oklch(0.78 0.11 150);
    --mono: 'JetBrains Mono', monospace;
  }
  *,
  *::before,
  *::after { box-sizing: border-box; }
  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  #root {
    position: relative;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background:
      linear-gradient(90deg, rgba(19, 66, 61, 0.08) 0 1px, rgba(19, 66, 61, 0) 1px 74px),
      linear-gradient(0deg, rgba(26, 26, 30, 0.055) 0 1px, rgba(26, 26, 30, 0) 1px 58px),
      var(--bg);
  }

  svg.stage { display: block; width: 100%; height: 100%; }
  .clip { position: absolute; inset: 0; will-change: transform, opacity; }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    fill: var(--ink);
    letter-spacing: 0.01em;
  }
  .micro {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: var(--ink-70);
    letter-spacing: 0.02em;
  }
  .phone,
  .panel {
    fill: var(--bg-2);
    stroke: var(--hairline);
    stroke-width: 1;
  }
  .bubble {
    fill: rgba(19, 66, 61, 0.12);
    stroke: rgba(19, 66, 61, 0.36);
    stroke-width: 1;
  }
  .state {
    fill: var(--bg);
    stroke: var(--hairline);
    stroke-width: 1;
  }
  .state.is-active,
  .invoice-page.is-active {
    fill: rgba(19, 66, 61, 0.14);
    stroke: var(--accent);
  }
  .edge-flow {
    fill: none;
    stroke: rgba(19, 66, 61, 0.45);
    stroke-width: 1.4;
    stroke-linecap: round;
  }
  .packet {
    fill: var(--motion-node);
  }
  .invoice-page {
    fill: var(--bg);
    stroke: var(--hairline);
    stroke-width: 1;
  }
  .check {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="600" data-height="400" data-start="0" data-duration="5" data-track-index="0">
    <div id="neev-card-scene" class="clip" data-start="0" data-duration="5" data-track-index="1">
      <svg class="stage" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <path class="edge-flow" id="flow-order" d="M182 118 C224 116 238 116 272 116" />
        <path class="edge-flow" id="flow-stock" d="M395 134 C435 145 455 165 474 204" />
        <path class="edge-flow" id="flow-invoice" d="M468 274 C418 302 340 306 294 270" />

        <g id="whatsapp">
          <rect class="phone" x="44" y="52" width="138" height="246" rx="18" />
          <rect class="bubble" x="64" y="92" width="92" height="36" rx="9" />
          <text class="micro" x="76" y="115">2 kg atta</text>
          <rect class="bubble" x="82" y="144" width="76" height="36" rx="9" />
          <text class="micro" x="94" y="167">paid UPI</text>
          <rect class="bubble" x="62" y="208" width="100" height="46" rx="9" />
          <text class="micro" x="74" y="228">send bill</text>
          <text class="label" x="66" y="325">WhatsApp</text>
        </g>

        <g id="order">
          <rect class="panel" x="270" y="70" width="126" height="104" rx="7" />
          <text class="label" x="290" y="100">Order</text>
          <rect class="state" id="order-sku" x="288" y="118" width="78" height="18" rx="3" />
          <text class="micro" x="298" y="131">SKU mapped</text>
          <rect class="state" x="288" y="144" width="88" height="18" rx="3" />
          <text class="micro" x="298" y="157">cash entry</text>
        </g>

        <g id="inventory">
          <rect class="panel" x="454" y="184" width="104" height="112" rx="7" />
          <text class="label" x="474" y="213">Stock</text>
          <rect class="state" id="stock-atta" x="474" y="232" width="62" height="18" rx="3" />
          <text class="micro" x="486" y="245">atta -2</text>
          <rect class="state" x="474" y="258" width="62" height="18" rx="3" />
          <text class="micro" x="488" y="271">ledger</text>
        </g>

        <g id="invoice">
          <rect class="panel" x="236" y="226" width="106" height="112" rx="7" />
          <rect class="invoice-page" x="258" y="248" width="58" height="70" rx="3" />
          <line class="edge is-dashed" x1="268" y1="268" x2="306" y2="268" />
          <line class="edge is-dashed" x1="268" y1="286" x2="300" y2="286" />
          <path class="check" id="invoice-check" d="M270 306 L278 314 L296 294" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" />
          <text class="label" x="251" y="358">Invoice</text>
        </g>

        <circle class="packet" id="packet-a" cx="182" cy="118" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-b" cx="395" cy="134" r="5" data-layout-allow-overflow />
        <circle class="packet" id="packet-c" cx="468" cy="274" r="5" data-layout-allow-overflow />
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/MotionPathPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(MotionPathPlugin);

    const tl = gsap.timeline({ paused: true });
    tl.from('#whatsapp', { x: -22, opacity: 0, duration: 0.48, ease: 'power3.out' }, 0.15);
    tl.from('#order', { y: -18, opacity: 0, duration: 0.42, ease: 'back.out(1.35)' }, 0.42);
    tl.from('#inventory', { x: 24, opacity: 0, duration: 0.5, ease: 'expo.out' }, 0.82);
    tl.from('#invoice', { y: 24, scale: 0.96, opacity: 0, duration: 0.52, ease: 'power2.out' }, 1.14);

    tl.fromTo('#packet-a', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#flow-order', align: '#flow-order', alignOrigin: [0.5, 0.5] },
      duration: 1.05,
      ease: 'power1.inOut',
    }, 1.15);
    tl.to('#order-sku', { fill: 'rgba(19, 66, 61, 0.14)', duration: 0.25, ease: 'sine.out' }, 2.05);
    tl.fromTo('#packet-b', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#flow-stock', align: '#flow-stock', alignOrigin: [0.5, 0.5] },
      duration: 1.0,
      ease: 'power2.inOut',
    }, 2.05);
    tl.to('#stock-atta', { fill: 'rgba(19, 66, 61, 0.14)', duration: 0.25, ease: 'sine.out' }, 2.95);
    tl.fromTo('#packet-c', { opacity: 0 }, {
      opacity: 1,
      motionPath: { path: '#flow-invoice', align: '#flow-invoice', alignOrigin: [0.5, 0.5] },
      duration: 1.05,
      ease: 'power3.inOut',
    }, 3.05);
    tl.to('#invoice .invoice-page', { fill: 'rgba(19, 66, 61, 0.14)', stroke: '#13423D', duration: 0.25 }, 3.8);
    tl.to('#invoice-check', { strokeDashoffset: 0, duration: 0.45, ease: 'power2.out' }, 3.95);
    tl.to(['#packet-a', '#packet-b', '#packet-c'], { opacity: 0, duration: 0.28, ease: 'power1.in' }, 4.55);

    window.__timelines = window.__timelines || {};
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
