<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>vericite · hero loop</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<link rel="stylesheet" href="../shared/base.css" />
<style>
  /* 1600×900 ambient hero. Seven candidate rows; a beam sweeps the column
     once per 10s cycle; the row at y=490 resolves as the canonical match. */

  svg.stage { display: block; width: 100%; height: 100%; opacity: 0.55; }

  .grid-line { stroke: var(--ink-25); stroke-width: 1; }

  .cite-row  { fill: var(--ink-10); stroke: var(--ink-25); stroke-width: 1; }
  .cite-row.is-match { fill: var(--accent-40); stroke: var(--accent); }

  .scan-line { stroke: var(--accent); stroke-width: 1.5; opacity: 0.28; }

  .check-mark {
    fill: none; stroke: var(--accent); stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="1600" data-height="900" data-start="0" data-duration="10">
    <div class="clip" data-start="0" data-duration="10" data-track-index="0">
      <svg class="stage" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <!-- three base grid rules — wider for the hero crop -->
        <line class="grid-line" x1="240" y1="280" x2="1360" y2="280" />
        <line class="grid-line" x1="240" y1="450" x2="1360" y2="450" />
        <line class="grid-line" x1="240" y1="620" x2="1360" y2="620" />

        <line class="scan-line" id="scan" x1="240" y1="230" x2="1360" y2="230" />

        <!-- seven candidate rows, middle one marked as the match -->
        <rect class="cite-row" id="row-1" x="300" y="230" width="1000" height="44" rx="3" />
        <rect class="cite-row" id="row-2" x="300" y="300" width="1000" height="44" rx="3" />
        <rect class="cite-row" id="row-3" x="300" y="370" width="1000" height="44" rx="3" />
        <rect class="cite-row is-match" id="row-4" x="300" y="440" width="1000" height="44" rx="3" />
        <rect class="cite-row" id="row-5" x="300" y="510" width="1000" height="44" rx="3" />
        <rect class="cite-row" id="row-6" x="300" y="580" width="1000" height="44" rx="3" />
        <rect class="cite-row" id="row-7" x="300" y="650" width="1000" height="44" rx="3" />

        <path class="check-mark" id="check"
              d="M 1240 462 L 1256 478 L 1282 452"
              pathLength="1"
              stroke-dasharray="1" stroke-dashoffset="1" />
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    // Act 1 (0–2s) — rows fade up staggered
    ['#row-1','#row-2','#row-3','#row-4','#row-5','#row-6','#row-7'].forEach((sel, i) => {
      tl.from(sel, { x: -40, opacity: 0, duration: 0.6, ease: 'power2.out' }, 0.1 + i * 0.15);
    });

    // Act 2 (2–6s) — scan beam drifts from top to bottom
    tl.fromTo('#scan',
      { attr: { y1: 230, y2: 230 }, opacity: 0 },
      { attr: { y1: 700, y2: 700 }, opacity: 0.28, duration: 4.0, ease: 'none' },
      2.0
    );

    // Act 3 (6–7s) — match pulse
    tl.to('#row-4', {
      scale: 1.02, transformOrigin: '50% 50%',
      duration: 0.5, ease: 'power1.out', yoyo: true, repeat: 1,
    }, 6.0);

    // Act 4 (6.8–7.8s) — check draws in
    tl.to('#check', { strokeDashoffset: 0, duration: 1.0, ease: 'power2.out' }, 6.8);

    // Reset (8.8–10s) — clear the slate for the loop
    tl.to('#check', { strokeDashoffset: 1, duration: 0.8, ease: 'power2.in' }, 8.8);
    tl.to('#scan',  { opacity: 0, duration: 0.6, ease: 'power1.in' }, 9.0);

    window.__timelines = window.__timelines || {};
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
