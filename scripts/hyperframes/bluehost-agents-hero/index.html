<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>bluehost-agents · hero loop</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<link rel="stylesheet" href="../shared/base.css" />
<style>
  /* 1600×900 ambient hero. One long request trace over an SLO budget line;
     five waypoints ping in sequence; curve redraws once per cycle. */

  svg.stage { display: block; width: 100%; height: 100%; opacity: 0.55; }

  .axis   { stroke: var(--ink-15); stroke-width: 1; }
  .curve  { fill: none; stroke: var(--accent); stroke-width: 2.5;
            stroke-linecap: round; stroke-linejoin: round; }
  .budget { fill: none; stroke: var(--ink-40); stroke-width: 1.2;
            stroke-dasharray: 6 7; }

  .waypoint      { fill: var(--accent); }
  .waypoint-ring { fill: none; stroke: var(--accent); stroke-width: 1.5;
                   opacity: 0; transform-box: fill-box; transform-origin: center; }
</style>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="1600" data-height="900" data-start="0" data-duration="10">
    <div class="clip" data-start="0" data-duration="10" data-track-index="0">
      <svg class="stage" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <line class="axis" x1="200" y1="740" x2="1400" y2="740" />
        <line class="axis" x1="200" y1="180" x2="200"  y2="740" />

        <line class="budget" x1="200" y1="340" x2="1400" y2="340" />

        <!-- wide, multi-waypoint latency curve -->
        <path class="curve" id="curve"
              d="M 200 680
                 C 340 660, 420 560, 540 540
                 S 720 500, 820 460
                 S 980 420, 1100 420
                 S 1280 460, 1400 380"
              pathLength="1"
              stroke-dasharray="1" stroke-dashoffset="1" />

        <g id="wp-1"><circle class="waypoint-ring" cx="420"  cy="595" r="14" /><circle class="waypoint" cx="420"  cy="595" r="5" /></g>
        <g id="wp-2"><circle class="waypoint-ring" cx="640"  cy="510" r="14" /><circle class="waypoint" cx="640"  cy="510" r="5" /></g>
        <g id="wp-3"><circle class="waypoint-ring" cx="860"  cy="450" r="14" /><circle class="waypoint" cx="860"  cy="450" r="5" /></g>
        <g id="wp-4"><circle class="waypoint-ring" cx="1100" cy="420" r="14" /><circle class="waypoint" cx="1100" cy="420" r="5" /></g>
        <g id="wp-5"><circle class="waypoint-ring" cx="1320" cy="405" r="14" /><circle class="waypoint" cx="1320" cy="405" r="5" /></g>
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    tl.set(['#wp-1','#wp-2','#wp-3','#wp-4','#wp-5'], { opacity: 0 }, 0);

    // Act 1 (0–4s) — curve draws in, left to right
    tl.to('#curve', { strokeDashoffset: 0, duration: 4.0, ease: 'power1.inOut' }, 0);

    // Waypoints appear as the pen passes them
    tl.to('#wp-1', { opacity: 1, duration: 0.3 }, 1.0);
    tl.to('#wp-2', { opacity: 1, duration: 0.3 }, 1.9);
    tl.to('#wp-3', { opacity: 1, duration: 0.3 }, 2.6);
    tl.to('#wp-4', { opacity: 1, duration: 0.3 }, 3.2);
    tl.to('#wp-5', { opacity: 1, duration: 0.3 }, 3.8);

    // Act 2 (4–8s) — rings ping outward, staggered
    ['#wp-1','#wp-2','#wp-3','#wp-4','#wp-5'].forEach((sel, i) => {
      tl.fromTo(`${sel} .waypoint-ring`,
        { scale: 1, opacity: 0.5 },
        { scale: 2.3, opacity: 0, duration: 1.6, ease: 'power1.out' },
        4.0 + i * 0.4
      );
    });

    // Reset (8.8–10s) — fade curve and dots so the loop starts clean
    tl.to('#curve', { strokeDashoffset: 1, duration: 0.8, ease: 'power2.in' }, 8.8);
    tl.to(['#wp-1','#wp-2','#wp-3','#wp-4','#wp-5'], { opacity: 0, duration: 0.6 }, 9.0);

    window.__timelines = window.__timelines || {};
    window.__timelines['root'] = tl;
  </script>
</body>
</html>
