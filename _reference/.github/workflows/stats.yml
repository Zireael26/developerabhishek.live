name: Refresh GitHub stats

on:
  schedule:
    - cron: '17 4 * * 1'   # Mondays 04:17 UTC
  workflow_dispatch:        # also allow manual runs

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch stats
        env:
          # PAT with `read:user` + `repo` scope. Store as repo secret GH_STATS_TOKEN.
          # Falls back to the default GITHUB_TOKEN if you don't need private-repo coverage.
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-github-stats.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain portfolio/data/stats.json)" ]]; then
            git config user.name  "stats-bot"
            git config user.email "stats-bot@users.noreply.github.com"
            git add portfolio/data/stats.json
            git commit -m "chore(stats): weekly refresh"
            git push
          else
            echo "No changes."
          fi
