# Lighthouse CI config — mobile variant. Invoked by
# `.github/workflows/lighthouse.yml` alongside the desktop config against
# the runner-local production server. Mobile is where the real launch
# risk lives (slower CPU emulation, slower network, image weight) so the
# thresholds are split out separately.
#
# Launch target (PRD §5 + AGENT_READINESS §2): same as desktop. PR-3 of
# the gap-analysis plan flips the categories that the current mobile
# measurement clears to `error`. Mobile performance is intentionally
# allowed to sit lower than desktop (0.9 vs. 0.95) until the post-Phase-5
# bundle reduction lands and the mobile image LCP profile is audited.

ci:
  collect:
    numberOfRuns: 3
    # Lighthouse CI defaults to the mobile emulation profile when no
    # preset is specified; `preset: mobile` is not valid (allowed values:
    # "perf", "experimental", "desktop").
  assert:
    assertions:
      # Measured 2026-05-19 mobile home: 0.92 / 0.97 / 0.96 / 0.92.
      categories:performance: ['error', { minScore: 0.9 }]
      categories:accessibility: ['error', { minScore: 0.95 }]
      categories:best-practices: ['error', { minScore: 0.9 }]
      categories:seo: ['warn', { minScore: 0.9 }]

      # Same ceiling as desktop (mobile + desktop share the same JS
      # payload today; if/when mobile gets a different code-split, decouple
      # these). Tracked back toward 150 KiB by docs/BUNDLE_BUDGET.md.
      resource-summary:script:size:
        - 'warn'
        - maxNumericValue: 409600 # 400 KiB

  upload:
    target: temporary-public-storage
